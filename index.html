<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Novaire AI · elegant intelligence</title>
  <!-- Font Awesome for clean icons (no framework) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, sans-serif;
      background: #0e1a1f; /* deep fallback */
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 12px;
      /* Logo‑inspired gradient: soft teal → muted cyan → deep blue → cool grey, with misty diffusion */
      background-image: 
        radial-gradient(circle at 20% 30%, rgba(200, 235, 230, 0.45) 0%, transparent 45%),
        radial-gradient(circle at 80% 70%, rgba(140, 190, 200, 0.35) 0%, transparent 50%),
        radial-gradient(circle at 40% 80%, rgba(160, 200, 210, 0.25) 0%, transparent 55%),
        linear-gradient(145deg, #c4dfe6 0%, #9dc2c9 18%, #6b9aa6 40%, #3f6372 65%, #2a404d 85%, #1e2f38 100%);
      background-blend-mode: overlay, soft-light, normal, normal;
      position: relative;
    }

    /* subtle grain overlay — premium texture */
    body::after {
      content: "";
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none;
      background-image: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIzMDAiIGhlaWdodD0iMzAwIj48ZmlsdGVyIGlkPSJmIj48ZmVUdXJidWxlbmNlIHR5cGU9ImZyYWN0YWxOb2lzZSIgYmFzZUZyZXF1ZW5jeT0iLjc1IiBudW1PY3RhdmVzPSIzIiAvPjwvZmlsdGVyPjxyZWN0IHdpZHRoPSIxMDAlIiBoZWlnaHQ9IjEwMCUiIGZpbHRlcj0idXJsKCNmKSIgb3BhY2l0eT0iMC4wNCIgLz48L3N2Zz4=');
      opacity: 0.2;
      mix-blend-mode: soft-light;
      z-index: 0;
    }

    /* main app container — glass foundation */
    .app {
      position: relative;
      z-index: 2;
      display: flex;
      width: 100%;
      max-width: 1440px;
      height: 92vh;
      min-height: 640px;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(28px) saturate(180%);
      -webkit-backdrop-filter: blur(28px) saturate(180%);
      border-radius: 36px;
      box-shadow: 0 25px 45px -12px rgba(0, 20, 30, 0.25), 
                  inset 0 1px 2px rgba(255, 255, 255, 0.2);
      border: 1px solid rgba(210, 235, 245, 0.18);
      overflow: hidden;
      transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1);
    }

    /* ---------- SIDEBAR (glass, collapsible) ---------- */
    .sidebar {
      width: 280px;
      background: rgba(18, 40, 50, 0.28);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-right: 1px solid rgba(200, 225, 235, 0.1);
      display: flex;
      flex-direction: column;
      padding: 24px 16px 20px 16px;
      transition: width 0.35s ease, padding 0.3s ease, opacity 0.25s;
      overflow: hidden;
      white-space: nowrap;
      box-shadow: inset -1px 0 0 rgba(255,255,255,0.05);
    }

    .sidebar.collapsed {
      width: 0;
      padding-left: 0;
      padding-right: 0;
      border-right: none;
      opacity: 0;
    }

    /* sidebar inner structure */
    .sidebar-content {
      display: flex;
      flex-direction: column;
      height: 100%;
      min-width: 240px;
    }

    /* conversation list */
    .conv-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
      padding: 0 4px;
    }
    .conv-header h3 {
      font-family: 'Playfair Display', 'Times New Roman', serif;
      font-weight: 400;
      letter-spacing: -0.02em;
      color: #eef7fc;
      text-shadow: 0 1px 4px rgba(0,20,30,0.3);
      font-size: 1.3rem;
      opacity: 0.9;
    }
    .new-chat-btn {
      background: rgba(220, 240, 250, 0.12);
      border: 0.5px solid rgba(255,255,255,0.15);
      color: #deecf2;
      width: 32px; height: 32px;
      border-radius: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      backdrop-filter: blur(5px);
      transition: all 0.2s;
    }
    .new-chat-btn:hover {
      background: rgba(190, 225, 240, 0.25);
      border-color: rgba(255,255,255,0.3);
      color: white;
    }

    .conversation-list {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding-right: 4px;
    }
    .conv-item {
      padding: 12px 14px;
      border-radius: 18px;
      background: rgba(220, 240, 250, 0.05);
      backdrop-filter: blur(4px);
      border: 0.5px solid rgba(210, 235, 245, 0.08);
      color: #e0eef5;
      font-size: 0.95rem;
      font-weight: 400;
      transition: all 0.2s;
      cursor: default;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .conv-item i {
      margin-right: 12px;
      opacity: 0.7;
      font-size: 0.9rem;
      color: #b3d9e8;
    }
    .conv-item:hover {
      background: rgba(200, 230, 245, 0.18);
      border-color: rgba(255,255,255,0.2);
    }
    .conv-item.active {
      background: rgba(140, 200, 220, 0.22);
      border-left: 3px solid #aad0df;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.1);
    }

    /* user panel (bottom of sidebar) */
    .user-panel {
      margin-top: 20px;
      padding-top: 16px;
      border-top: 0.5px solid rgba(210, 235, 245, 0.15);
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .avatar {
      width: 42px; height: 42px;
      background: linear-gradient(135deg, #9fcad4, #3a6677);
      border-radius: 42px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 400;
      font-size: 1.1rem;
      box-shadow: 0 6px 12px -4px rgba(0,20,30,0.2);
      border: 1px solid rgba(255,255,255,0.2);
      text-transform: uppercase;
    }
    .user-info {
      flex: 1;
    }
    .user-name {
      color: #ecf6fb;
      font-weight: 450;
      letter-spacing: -0.01em;
    }
    .user-settings {
      color: #b8d8e6;
      font-size: 1.2rem;
      cursor: pointer;
      opacity: 0.8;
      transition: opacity 0.2s;
    }
    .user-settings:hover { opacity: 1; }

    /* ---------- MAIN CHAT AREA ---------- */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
      background: transparent;
      position: relative;
    }

    /* top bar — subtle branding + toggle */
    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 28px 10px 28px;
    }
    .brand {
      font-family: 'Playfair Display', 'Times New Roman', serif;
      font-size: 1.8rem;
      font-weight: 400;
      letter-spacing: -0.02em;
      color: rgba(235, 250, 255, 0.55);
      text-shadow: 0 2px 8px rgba(0,0,0,0.1);
      transition: opacity 0.2s;
    }
    .menu-toggle {
      background: rgba(220, 240, 250, 0.12);
      backdrop-filter: blur(8px);
      border: 0.5px solid rgba(255,255,255,0.15);
      color: #d2e9f2;
      width: 44px; height: 44px;
      border-radius: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.4rem;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 4px 10px -4px rgba(0,0,0,0.1);
    }
    .menu-toggle:hover {
      background: rgba(190, 225, 245, 0.3);
      color: white;
      border-color: rgba(255,255,255,0.3);
    }

    /* chat messages container */
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px 24px 24px 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
    }

    /* message bubbles — glass */
    .message {
      display: flex;
      max-width: 75%;
      animation: fadeSlide 0.3s ease-out;
    }
    .message.user {
      align-self: flex-end;
    }
    .message.assistant {
      align-self: flex-start;
    }
    .bubble {
      padding: 14px 20px;
      border-radius: 26px;
      background: rgba(245, 255, 255, 0.12);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 0.5px solid rgba(230, 250, 255, 0.2);
      box-shadow: 0 8px 18px -8px rgba(0, 30, 40, 0.2);
      color: #1e2f38;
      font-weight: 400;
      line-height: 1.5;
      word-break: break-word;
    }
    .user .bubble {
      background: rgba(50, 90, 110, 0.35);
      backdrop-filter: blur(16px);
      border: 0.5px solid rgba(180, 220, 240, 0.3);
      color: #ecf6fc;
      border-bottom-right-radius: 8px;
    }
    .assistant .bubble {
      background: rgba(235, 250, 255, 0.2);
      backdrop-filter: blur(16px);
      border: 0.5px solid rgba(210, 240, 255, 0.25);
      color: #1a2c35;
      border-bottom-left-radius: 8px;
    }

    @keyframes fadeSlide {
      0% { opacity: 0; transform: translateY(8px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    /* input area — pill shaped glass */
    .input-container {
      padding: 16px 28px 28px 28px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .input-wrapper {
      flex: 1;
      display: flex;
      align-items: center;
      background: rgba(230, 248, 255, 0.18);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 60px;
      padding: 6px 8px 6px 22px;
      border: 0.5px solid rgba(210, 240, 255, 0.3);
      box-shadow: 0 8px 18px -8px rgba(0,20,30,0.15), inset 0 1px 2px rgba(255,255,255,0.3);
    }
    .input-wrapper input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      padding: 14px 0;
      font-size: 1rem;
      color: #1e323e;
      font-weight: 400;
    }
    .input-wrapper input::placeholder {
      color: #3d5b68;
      opacity: 0.7;
      font-style: italic;
      letter-spacing: -0.01em;
    }
    .send-btn {
      background: rgba(90, 150, 170, 0.45);
      backdrop-filter: blur(8px);
      border: 0.5px solid rgba(255,255,255,0.2);
      color: #e1f2fa;
      width: 48px; height: 48px;
      border-radius: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 1.2rem;
      margin-left: 4px;
    }
    .send-btn:hover {
      background: #5f9eb0;
      color: white;
      border-color: rgba(255,255,255,0.5);
    }

    /* model selector (dropdown style) */
    .model-selector {
      position: relative;
    }
    .model-btn {
      background: rgba(200, 230, 240, 0.18);
      backdrop-filter: blur(12px);
      border: 0.5px solid rgba(200, 230, 245, 0.25);
      color: #1e3745;
      padding: 10px 16px;
      border-radius: 40px;
      font-size: 0.9rem;
      font-weight: 450;
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      box-shadow: 0 4px 10px -4px rgba(0,0,0,0.05);
      transition: 0.15s;
    }
    .model-btn i {
      font-size: 0.8rem;
      opacity: 0.8;
    }
    .model-btn:hover {
      background: rgba(180, 220, 235, 0.35);
    }
    .model-dropdown {
      position: absolute;
      bottom: 58px;
      right: 0;
      background: rgba(20, 45, 55, 0.7);
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
      border-radius: 24px;
      padding: 8px 0;
      min-width: 180px;
      border: 0.5px solid rgba(200, 230, 245, 0.25);
      box-shadow: 0 20px 30px -8px rgba(0,0,0,0.2);
      display: none;
      z-index: 100;
    }
    .model-dropdown.show {
      display: block;
    }
    .model-option {
      padding: 12px 20px;
      color: #d5ecf5;
      cursor: pointer;
      font-weight: 400;
      transition: background 0.15s;
    }
    .model-option:hover {
      background: rgba(150, 200, 220, 0.25);
    }
    .model-option.active-model {
      background: rgba(110, 180, 200, 0.3);
      border-left: 3px solid #b3dfec;
    }

    /* scrollbar refinement */
    .chat-messages::-webkit-scrollbar, .conversation-list::-webkit-scrollbar {
      width: 4px;
    }
    .chat-messages::-webkit-scrollbar-track {
      background: transparent;
    }
    .chat-messages::-webkit-scrollbar-thumb {
      background: rgba(140, 180, 190, 0.3);
      border-radius: 20px;
    }

    /* responsive */
    @media (max-width: 700px) {
      .app { height: 96vh; border-radius: 24px; }
      .sidebar { position: absolute; left: 0; top: 0; bottom: 0; z-index: 30; border-radius: 24px 0 0 24px; }
      .sidebar.collapsed { width: 0; padding: 0; }
      .main { width: 100%; }
      .brand { font-size: 1.5rem; }
    }
  </style>
</head>
<body>
<div class="app">
  <!-- SIDEBAR (glass, collapsible) -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-content">
      <div class="conv-header">
        <h3>Conversations</h3>
        <div class="new-chat-btn" title="New chat"><i class="fas fa-plus"></i></div>
      </div>
      <div class="conversation-list">
        <div class="conv-item active"><i class="far fa-comment-dots"></i> Brand strategy Q2</div>
        <div class="conv-item"><i class="far fa-comment"></i> Research synthesis</div>
        <div class="conv-item"><i class="far fa-comment"></i> Design system notes</div>
        <div class="conv-item"><i class="far fa-comment"></i> Competitive analysis</div>
        <div class="conv-item"><i class="far fa-comment"></i> Weekly reflection</div>
      </div>
      <div class="user-panel">
        <div class="avatar">E</div>
        <div class="user-info">
          <div class="user-name">Eleanor Voss</div>
        </div>
        <div class="user-settings"><i class="fas fa-sliders-h"></i></div>
      </div>
    </div>
  </aside>

  <!-- MAIN CHAT -->
  <main class="main">
    <div class="top-bar">
      <div class="brand">Novaire AI</div>
      <div class="menu-toggle" id="sidebarToggle"><i class="fas fa-chevron-left" id="toggleIcon"></i></div>
    </div>

    <!-- Messages area -->
    <div class="chat-messages" id="chatMessages">
      <!-- initial elegant welcome -->
      <div class="message assistant">
        <div class="bubble">Good day. I’m Novaire — your refined AI companion.<br>How may I assist you?</div>
      </div>
    </div>

    <!-- Input bar -->
    <div class="input-container">
      <div class="input-wrapper">
        <input type="text" id="messageInput" placeholder="Ask Novaire…" autocomplete="off">
        <div class="send-btn" id="sendBtn"><i class="fas fa-arrow-up"></i></div>
      </div>
      
      <!-- Model selector (dynamic from MODELS array) -->
      <div class="model-selector" id="modelSelectorWrapper">
        <div class="model-btn" id="modelBtn">
          <span id="currentModelLabel">Novaire Core</span>
          <i class="fas fa-chevron-down"></i>
        </div>
        <div class="model-dropdown" id="modelDropdown"></div>
      </div>
    </div>
  </main>
</div>

<script>
  (function(){
    "use strict";

    // ---------- ✦ MODEL SYSTEM ✦ (easy to edit/extend) ----------
    const MODELS = [
      { name: "Novaire Core", id: "core" },
      { name: "Novaire Code", id: "code" },
      { name: "Novaire Vision", id: "vision" }  // extendable
    ];

    // current model state
    let currentModel = MODELS[0];  // default

    // DOM elements
    const sidebar = document.getElementById('sidebar');
    const toggleBtn = document.getElementById('sidebarToggle');
    const toggleIcon = document.getElementById('toggleIcon');
    const chatMessages = document.getElementById('chatMessages');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const modelBtn = document.getElementById('modelBtn');
    const modelDropdown = document.getElementById('modelDropdown');
    const currentModelLabel = document.getElementById('currentModelLabel');

    // ---------- SIDEBAR TOGGLE (smooth) ----------
    function toggleSidebar() {
      sidebar.classList.toggle('collapsed');
      // rotate icon for elegance
      if (sidebar.classList.contains('collapsed')) {
        toggleIcon.className = 'fas fa-chevron-right';
      } else {
        toggleIcon.className = 'fas fa-chevron-left';
      }
    }
    toggleBtn.addEventListener('click', toggleSidebar);

    // ---------- RENDER MODEL DROPDOWN ----------
    function renderModelDropdown() {
      if (!modelDropdown) return;
      let html = '';
      MODELS.forEach(model => {
        const activeClass = (currentModel.id === model.id) ? 'active-model' : '';
        html += `<div class="model-option ${activeClass}" data-model-id="${model.id}">${model.name}</div>`;
      });
      modelDropdown.innerHTML = html;

      // attach listeners to options
      document.querySelectorAll('.model-option').forEach(opt => {
        opt.addEventListener('click', (e) => {
          const modelId = opt.dataset.modelId;
          const selected = MODELS.find(m => m.id === modelId);
          if (selected) {
            currentModel = selected;
            currentModelLabel.textContent = selected.name;
            // update active class
            document.querySelectorAll('.model-option').forEach(o => o.classList.remove('active-model'));
            opt.classList.add('active-model');
            modelDropdown.classList.remove('show');
          }
        });
      });
    }

    // Toggle dropdown visibility
    modelBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      modelDropdown.classList.toggle('show');
    });
    // close when clicking outside
    document.addEventListener('click', (e) => {
      if (!modelSelectorWrapper.contains(e.target)) {
        modelDropdown.classList.remove('show');
      }
    });

    // initialize dropdown
    renderModelDropdown();
    // also update label if needed
    currentModelLabel.textContent = currentModel.name;

    // ---------- UTILS: auto-scroll, add message ----------
    function scrollToBottom() {
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    function addMessage(content, sender, isTemp = false, tempId = null) {
      const msgDiv = document.createElement('div');
      msgDiv.className = `message ${sender}`;
      if (tempId) msgDiv.id = tempId;
      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.textContent = content;
      msgDiv.appendChild(bubble);
      chatMessages.appendChild(msgDiv);
      scrollToBottom();
      return msgDiv;
    }

    // ---------- ✦ BACKEND-READY sendMessage (async, model-aware) ✦ ----------
    async function sendMessage(message, model) {
      // MOCK — replace with actual fetch later
      return new Promise((resolve) => {
        setTimeout(() => {
          const modelName = model.name;
          let response = `Thank you for your message. (using ${modelName})`;
          if (model.id === 'core') response = `Novaire Core insight: "${message}" — I sense thoughtful depth. Let’s explore further.`;
          else if (model.id === 'code') response = `[Code analysis] I’ve processed your request. The structure appears sound. Consider edge cases.`;
          else if (model.id === 'vision') response = `Visual perspective: I interpret a balanced composition. Would you like a detailed breakdown?`;
          else response = `I’ve received: “${message}” — ready when you are.`;
          resolve(response);
        }, 900);
      });
    }

    // ---------- HANDLE SEND (user message + AI simulation) ----------
    async function handleSendMessage() {
      const text = messageInput.value.trim();
      if (!text) return;

      // Add user message
      addMessage(text, 'user');
      messageInput.value = '';
      
      // Show "Thinking..." placeholder
      const tempId = 'temp-' + Date.now();
      addMessage('Thinking…', 'assistant', true, tempId);
      
      try {
        // Call modular sendMessage with current model
        const aiResponse = await sendMessage(text, currentModel);
        
        // Remove temp message
        const tempEl = document.getElementById(tempId);
        if (tempEl) tempEl.remove();
        
        // Add final AI response
        addMessage(aiResponse, 'assistant');
      } catch (error) {
        const tempEl = document.getElementById(tempId);
        if (tempEl) tempEl.remove();
        addMessage('I apologize — an elegant error occurred. Please try again.', 'assistant');
      }
    }

    // Event listeners
    sendBtn.addEventListener('click', handleSendMessage);
    messageInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        handleSendMessage();
      }
    });

    // Model selector wrapper (to close dropdown on outside click)
    const modelSelectorWrapper = document.getElementById('modelSelectorWrapper');

    // small enhancement: update model label if changed externally? already set.

    // ---------- SIDEBAR conversations (active state demo) ----------
    document.querySelectorAll('.conv-item').forEach(item => {
      item.addEventListener('click', function() {
        document.querySelectorAll('.conv-item').forEach(c => c.classList.remove('active'));
        this.classList.add('active');
        // could load conversation here
      });
    });

    // new chat button (just clear messages demo)
    document.querySelector('.new-chat-btn').addEventListener('click', () => {
      // keep only first welcome? clear all but first? elegant reset:
      const messages = chatMessages.querySelectorAll('.message');
      for (let i = 1; i < messages.length; i++) messages[i].remove();
      // optional: reset to welcome if first removed? but we keep first.
      if (chatMessages.children.length === 0) {
        addMessage('Good day. I’m Novaire — your refined AI companion.\nHow may I assist you?', 'assistant');
      }
    });

    // initial scroll
    scrollToBottom();

    // optional: on window resize, keep scroll sane
    window.addEventListener('resize', () => { /* no action needed */ });
    
    // Also close dropdown on escape
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && modelDropdown.classList.contains('show')) {
        modelDropdown.classList.remove('show');
      }
    });

    // Expose for debugging (optional)
    window.NovaireState = { currentModel, MODELS };
  })();
</script>
<!-- subtle font imports for serif elegance -->
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital@0;1&family=Inter:wght@300;400;450&display=swap" rel="stylesheet">
</body>
</html>
